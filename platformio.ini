; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = featheresp32
framework = arduino
# Evita el error Errno 35 al intentar hacer Upload
upload_protocol = custom
upload_command = echo "Simulación lista para Wokwi"
lib_deps = 
    adafruit/DHT sensor library @ 1.4.6
    beegee-tokyo/DHT sensor library for ESPx@^1.19
    knolleary/PubSubClient@^2.8

# Entorno para el Nodo 1
[env:nodo1]
build_flags = -D NODO_ID=1 

# Entorno para el Nodo 2
[env:nodo2]
build_flags = -D NODO_ID=2 

# Entorno para el Nodo 3
[env:nodo3]
build_flags = -D NODO_ID=3 

# Entorno para el Nodo 4
[env:nodo4]
build_flags = -D NODO_ID=4 

