; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodo1-physical

[env]
platform = espressif32@6.7.0
board = featheresp32
framework = arduino
monitor_speed = 115200
# Evita el error Errno 35 al intentar hacer Upload
# upload_protocol = custom
# upload_command = echo "Simulación lista para Wokwi"
lib_deps = 
     knolleary/PubSubClient@^2.8
     sparkfun/SparkFun ENS160 Arduino Library@^1.0.5
     sparkfun/SparkFun BME280@^2.0.9
     claws/BH1750@^1.3.0


; ─────────────────────────────────────────────
; Nodo 1 — Zona Norte
; ─────────────────────────────────────────────
[env:nodo1-physical]
build_flags =
    -DNODO_ID=1
    -DDEVICE_ID=\"nodo_1\"
    -DZONE_ID=\"zona_norte\"

; ─────────────────────────────────────────────
; Nodo 2 — Zona Sur
; ─────────────────────────────────────────────
[env:nodo2-physical]
build_flags =
    -DNODO_ID=2
    -DDEVICE_ID=\"nodo_2\"
    -DZONE_ID=\"zona_sur\"

; ─────────────────────────────────────────────
; Nodo 3 — Zona Este
; ─────────────────────────────────────────────
[env:nodo3-physical]
build_flags =
    -DNODO_ID=3
    -DDEVICE_ID=\"nodo_3\"
    -DZONE_ID=\"zona_este\"

; ─────────────────────────────────────────────
; Nodo 4 — Zona Oeste
; ─────────────────────────────────────────────
[env:nodo4-physical]
build_flags =
    -DNODO_ID=4
    -DDEVICE_ID=\"nodo_4\"
    -DZONE_ID=\"zona_oeste\"